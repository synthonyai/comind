name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Prove boundary (no Prisma/OpenAI on the consumer path)
        run: npm run demo:prove

      - name: Barrel is clean
        run: npm run demo:check

      - name: Characterization oracles (cognitive contract)
        run: npm run characterize
